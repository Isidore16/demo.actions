name: Input Example

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod
      artifact_tag:
        description: "Choosing the git tag to be deployed"
        required: true

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the app
        run: |
          echo "Selected environment is ${{ inputs.environment }}"
          echo "Artifact tag is ${{ inputs.artifact_tag }}"
